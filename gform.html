<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pendataan Transaksi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 2.2em;
        }
        p {
            color: #718096;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .menu-btn:active {
            transform: translateY(-1px);
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <h1>Selamat Datang</h1>
        <p>Pilih menu untuk memulai pendataan Anda:</p>
        
        <!-- Ganti dengan link Google Form pendaftaran pengguna baru Anda -->
        <a href="https://forms.gle/7FBgRRm6FRjGXzxr7" 
           class="menu-btn" 
           target="_blank" 
           rel="noopener noreferrer"
           aria-label="Buka Form Pendaftaran Pengguna Baru">
            Pendaftaran Pengguna Baru
        </a>
        
        <!-- Ganti dengan link Google Form pengisian data transaksi Anda -->
        <a href="https://forms.gle/EHsRgLj5ekjEyXHM7" 
           class="menu-btn" 
           target="_blank" 
           rel="noopener noreferrer"
           aria-label="Buka Form Pengisian Data Transaksi">
            Pengisian Data Transaksi
        </a>

          <!-- Ganti dengan link Google Form pengisian data transaksi Anda -->
        <a href="https://datastudio.google.com/reporting/82341595-14a0-4cbd-b07f-6679cd9e9ebc" 
           class="menu-btn" 
           target="_blank" 
           rel="noopener noreferrer"
           aria-label="Buka Form Pengisian Data Transaksi">
            Liat Summary Transaksi
        </a>
        
        <!-- Tombol Kembali ke Homepage -->
        <a href="index.html"
            class="menu-btn" 
            style="background: #a0aec0; margin-top: 20px;"
            aria-label="Kembali ke Halaman Utama">
            Kembali ke Halaman Utama
</a>
        
        <p style="font-size: 0.9em; color: #a0aec0; margin-top: 30px;">
            Bagi Pengguna Baru dapat Mendaftar Terlebih Dahulu. Pengguna yang telah Mendaftar dapat Langsung mengakses Form Pengisian.
        </p>
    </div>
</body>
</html>
