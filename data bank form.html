<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Data Rekening Bank</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons {
      margin-top: 20px;
    }
    a {
      padding: 10px 15px;
      text-decoration: none;
      margin-right: 10px;
      border-radius: 4px;
      display: inline-block;
    }
    .btn-back {
      background-color: #6c757d;
      color: white;
    }
    .btn-next {
      background-color: #28a745;
      color: white;
    }
    .btn-back:hover {
      background-color: #5a6268;
    }
    .btn-next:hover {
      background-color: #1e7e34;
    }
  </style>
</head>
<body>
  <h2>Form Data Rekening Bank</h2>

  <form action="form3.html" method="GET">
    <div class="form-group">
      <label for="nama_bank">Nama Bank</label>
      <select id="nama_bank" name="nama_bank" required>
        <option value="">-- Pilih Bank --</option>
        <option value="bca">BCA</option>
        <option value="bni">BNI</option>
        <option value="bri">BRI</option>
        <option value="mandiri">Mandiri</option>
        <option value="cimb">CIMB Niaga</option>
        <option value="danamon">Danamon</option>
      </select>
    </div>

    <div class="form-group">
      <label for="nomor_rekening">Nomor Rekening</label>
      <input type="text" id="nomor_rekening" name="nomor_rekening" required />
      <!-- atau gunakan type="number" jika ingin input hanya angka -->
    </div>

    <!-- Tombol untuk kirim form ke halaman selanjutnya -->
    <button type="submit" style="background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; margin-right: 10px;">
      Lanjut ke Form Berikutnya
    </button>
  </form>


  <!-- Tautan untuk kembali ke form sebelumnya -->
  <a href="demografi form.html" class="btn-back">← Kembali ke Form Data Pribadi</a>

  
  <!-- Tautan untuk lanjut ke form selanjutnya (tanpa isi form) -->
  <a href="transaksi bank form.html" class="btn-next">Form Selanjutnya →</a>

</body>
</html>
