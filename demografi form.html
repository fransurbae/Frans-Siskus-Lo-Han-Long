<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Demografi dan Transaksi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background-color: #0056b3;
    }
    a {
      padding: 10px 15px;
      text-decoration: none;
      background-color: #28a745;
      color: white;
      border-radius: 4px;
      margin-left: 10px;
    }
    a:hover {
      background-color: #1e7e34;
    }
  </style>
</head>
<body>
  <h2>Form Data Pribadi - Halaman 1</h2>
  <form action="form2.html" method="GET">
    <div class="form-group">
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama" name="nama" required />
    </div>

    <div class="form-group">
      <label for="tanggal_lahir">Tanggal Lahir</label>
      <input type="date" id="tanggal_lahir" name="tanggal_lahir" required />
    </div>

    <div class="form-group">
      <label for="alamat">Alamat Lengkap</label>
      <textarea id="alamat" name="alamat" rows="3" required></textarea>
    </div>

    <div class="form-group">
      <label for="telepon">Nomor Telepon</label>
      <input type="tel" id="telepon" name="telepon" required />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />
    </div>

    <div class="form-group">
      <label for="pendidikan_terakhir">Pendidikan Terakhir</label>
      <select id="pendidikan_terakhir" name="pendidikan_terakhir" required>
        <option value="">-- Pilih --</option>
        <option value="sd">SD / Sederajat</option>
        <option value="smp">SMP / Sederajat</option>
        <option value="sma">SMA / SMK / Sederajat</option>
        <option value="d3">D3</option>
        <option value="s1">S1</option>
        <option value="s2">S2</option>
        <option value="s3">S3</option>
      </select>
    </div>
    <!-- Tautan (href) ke halaman selanjutnya -->
    <a href="data bank form.html">Halaman Selanjutnya (tanpa isi form)</a>
  </form>
</body>
</html>
